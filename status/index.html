<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Status - Rab's Labs</title>

<link rel="icon" href="https://raw.githubusercontent.com/Rabbibo/rabbibo.github.io/main/media/RabsLabsFBO.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --brunswick-green: #004643;
  --pomp-and-power: #706993;
  --silver: #bfb5af;
  --dim-gray: #6d6569;
  --raisin-black: #1a1423;
  --alert-red: #e74c3c;
  --good-green: #2ecc71;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Nanum Gothic", Arial, sans-serif;
  background-color: var(--silver);
  color: var(--raisin-black);
  line-height: 1.6;
  overflow-x: hidden;
}

/* --- Navigation & Header (Universal Design) --- */
header {
  position: fixed;
  width: 100%;
  background-color: var(--raisin-black);
  padding: 1.5rem 5%;
  z-index: 2000;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
header img { height: 50px; }

.desktop-nav a {
  color: var(--silver);
  text-decoration: none;
  font-weight: 700;
  margin-left: 2rem;
  padding: 0.2em 0.5em;
  border-radius: 5px;
  transition: 0.3s;
}
.desktop-nav a:hover { background-color: var(--pomp-and-power); border-radius:10px; }

/* Hamburger Menu Icon */
.hamburger {
  display: none;
  flex-direction: column;
  cursor: pointer;
  gap: 5px;
  z-index: 3000;
}
.hamburger span { 
  width: 30px; 
  height: 3px; 
  background-color: var(--silver); 
  border-radius: 2px; 
  transition: 0.3s;
}

/* Mobile Nav Overlay (Slide-in) */
.mobile-nav {
  position: fixed;
  top: 0;
  right: -100%;
  width: 100%;
  height: 100vh;
  background-color: var(--raisin-black);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 2rem;
  z-index: 2500;
  transition: 0.5s ease-in-out;
}
.mobile-nav.active { right: 0; }
.mobile-nav a {
  color: var(--silver);
  font-size: 1.8rem;
  font-family: 'Dela Gothic One', sans-serif;
  text-decoration: none;
}

/* --- Page Hero --- */
.page-title { padding: 150px 5% 2rem; text-align: center; }
.page-title h1 { font-family: 'Dela Gothic One', sans-serif; font-size: 3rem; color: var(--brunswick-green); }

/* --- Status Cards --- */
.status-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; padding: 2rem 5%; }
.server-card { 
  background: #fff; 
  border-radius: 12px; 
  padding: 2rem; 
  box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
  border-left: 5px solid var(--brunswick-green); 
  transition: border-color 0.5s ease; 
}
.status-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; transition: background-color 0.5s ease; }
.status-online { background-color: var(--good-green); }
.status-offline { background-color: var(--alert-red); }

/* --- Wave Separator --- */
.wave { line-height: 0; width: 100%; overflow: hidden; background-color: var(--silver); }
.wave svg { display: block; width: 100%; height: 100px; }

/* --- Media Feed --- */
.media-section { background-color: var(--brunswick-green); padding: 4rem 5%; color: var(--silver); margin-top: -1px; }
.media-list { max-width: 800px; margin: 2rem auto 0; }

.media-item {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.05);
  margin-bottom: 1.5rem;
  border-radius: 15px;
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

/* "Lift" Hover Effect */
.media-item:hover {
  transform: translateY(-8px);
  background: rgba(255,255,255,0.12);
  box-shadow: 0 10px 20px rgba(0,0,0,0.4);
  border-color: var(--pomp-and-power);
}

.media-poster { width: 90px; height: 135px; object-fit: cover; border-radius: 8px; margin-right: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
.media-info h4 { font-size: 1.3rem; margin-bottom: 5px; color: #fff; }
.media-info p { font-size: 0.9rem; opacity: 0.7; }

footer { text-align: center; padding: 2rem; background-color: var(--raisin-black); color: var(--silver); }

@media (max-width: 768px) {
  .desktop-nav { display: none; }
  .hamburger { display: flex; }
  .media-item { flex-direction: column; text-align: center; }
  .media-poster { margin-right: 0; margin-bottom: 15px; }
}
</style>
</head>
<body>

<header>
    <a href="/"><img src="https://raw.githubusercontent.com/Rabbibo/rabbibo.github.io/main/media/RabsLabsFBO.png" alt="Rab's Labs Logo"></a>
    <nav class="desktop-nav">
        <a href="/">Home</a>
        <a href="/projects">Projects</a>
        <a href="/status">Status</a>
        <a href="/portfolio">Portfolio</a>
        <a href="/links">Links</a>
    </nav>
    <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
    </div>
</header>

<nav class="mobile-nav" id="mobile-nav">
    <a href="/">Home</a>
    <a href="/projects">Projects</a>
    <a href="/status">Status</a>
    <a href="/portfolio">Portfolio</a>
    <a href="/links">Links</a>
</nav>

<div class="page-title">
    <h1>System Status</h1>
    <p>Server status and recently added media</p>
</div>

<div class="status-container">
    <div id="card-d14ms" class="server-card">
        <h3>D14MS</h3>
        <p><span id="dot-d14ms" class="status-indicator"></span><strong>Status:</strong> <span id="text-d14ms">Connecting...</span></p>
    </div>
    <div id="card-m11ad" class="server-card">
        <h3>M11AD</h3>
        <p><span id="dot-m11ad" class="status-indicator"></span><strong>Status:</strong> <span id="text-m11ad">Connecting...</span></p>
    </div>
</div>

<div class="wave">
  <svg viewBox="0 0 1440 150" preserveAspectRatio="none">
    <path d="M0,64 C360,160 1080,0 1440,64 L1440,150 L0,150 Z" fill="var(--brunswick-green)"></path>
  </svg>
</div>

<section class="media-section">
    <h2 style="font-family: 'Dela Gothic One'; text-align: center;">Library Activity</h2>
    <div id="jellyfin-feed" class="media-list">
        <p style="text-align: center;">Scanning D14MS library...</p>
    </div>
</section>

<footer>© 2026 Rab's Labs Inc. All rights reserved.</footer>

<script>
const KUMA_API = "https://restless-frost-d48b.rabslabs.workers.dev/";
const JELLY_API = "https://rapid-cake-1e6a.rabslabs.workers.dev/";

/* --- Hamburger Logic --- */
const hamburger = document.getElementById('hamburger');
const mobileNav = document.getElementById('mobile-nav');

hamburger.addEventListener('click', () => {
    mobileNav.classList.toggle('active');
});

document.querySelectorAll('.mobile-nav a').forEach(link => {
    link.addEventListener('click', () => {
        mobileNav.classList.remove('active');
    });
});

/* --- Status Tracking --- */
async function fetchStatus() {
    try {
        const response = await fetch(KUMA_API);
        const data = await response.json();
        const heartbeats = data.heartbeatList;
        const mapping = { '1': 'd14ms', '2': 'm11ad' };

        Object.keys(mapping).forEach(id => {
            const slug = mapping[id];
            if (heartbeats[id] && heartbeats[id].length > 0) {
                const latest = heartbeats[id][heartbeats[id].length - 1];
                updateCard(slug, latest.status);
            }
        });
    } catch (err) { setGlobalStatus("Connection Error"); }
}

function updateCard(id, status) {
    const dot = document.getElementById(`dot-${id}`);
    const text = document.getElementById(`text-${id}`);
    const card = document.getElementById(`card-${id}`);
    const isOnline = (status === 1);

    dot.className = `status-indicator ${isOnline ? 'status-online' : 'status-offline'}`;
    text.innerText = isOnline ? "Online" : "Offline";
    card.style.borderLeftColor = isOnline ? "var(--good-green)" : "var(--alert-red)";
}

function setGlobalStatus(msg) {
    ['d14ms', 'm11ad'].forEach(id => {
        document.getElementById(`text-${id}`).innerText = msg;
    });
}

/* --- Jellyfin Media Feed --- */
async function fetchJellyfin() {
    try {
        const res = await fetch(JELLY_API);
        const items = await res.json();
        const feed = document.getElementById('jellyfin-feed');
        feed.innerHTML = '';

        items.forEach(item => {
            const poster = `https://tv.rabslabs.xyz/Items/${item.Id}/Images/Primary?fillHeight=240&fillWidth=160&quality=90`;
            const year = item.ProductionYear ? ` • ${item.ProductionYear}` : "";
            
            feed.innerHTML += `
                <div class="media-item">
                    <img src="${poster}" class="media-poster" alt="${item.Name}">
                    <div class="media-info">
                        <h4>${item.Name}</h4>
                        <p>New Release${year}</p>
                    </div>
                </div>`;
        });
    } catch (err) { document.getElementById('jellyfin-feed').innerText = "Unable to reach media server."; }
}

// Initial fire
fetchStatus();
fetchJellyfin();
setInterval(fetchStatus, 30000); // 30s heartbeat
</script>

</body>
</html>
