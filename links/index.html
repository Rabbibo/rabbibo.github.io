<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links - Rab's Labs</title>

<link rel="icon" type="image/svg+xml" href="/media/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --brunswick-green: #004643;
  --pomp-and-power: #706993;
  --silver: #bfb5af;
  --raisin-black: #1a1423;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: "Nanum Gothic", Arial, sans-serif;
  background-color: var(--silver);
  color: var(--raisin-black);
  line-height: 1.6;
}

/* Header & Nav */
header {
  position: fixed;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.5rem 5%;
  background-color: var(--raisin-black);
  z-index: 1000;
}
header img { height: 50px; }

nav a {
  color: var(--silver);
  text-decoration: none;
  font-weight: 700;
  margin-left: 2rem;
  transition: all 0.3s;
  padding: 0.2em 0.5em;
  border-radius: 5px;
}
nav a:hover { background-color: var(--pomp-and-power); color: var(--silver); border-radius:10px; }

/* Hamburger Menu Logic */
.hamburger { cursor: pointer; display: none; margin-left: 1rem; }
.hamburger input { display: none; }
.hamburger svg { height: 3em; transition: transform 600ms cubic-bezier(0.4, 0, 0.2, 1); }
.line { 
  fill: none; 
  stroke: var(--brunswick-green); 
  stroke-linecap: round; 
  stroke-linejoin: round; 
  stroke-width: 3; 
  transition: stroke-dasharray 600ms cubic-bezier(0.4, 0, 0.2, 1), stroke-dashoffset 600ms cubic-bezier(0.4, 0, 0.2, 1); 
}
.line-top-bottom { stroke-dasharray: 12 63; }
.hamburger input:checked + svg { transform: rotate(-45deg); }
.hamburger input:checked + svg .line-top-bottom { stroke-dasharray: 20 300; stroke-dashoffset: -32.42; }

.mobile-menu {
  position: fixed;
  top: 80px;
  right: 20px;
  background-color: var(--brunswick-green);
  border-radius: 15px;
  padding: 2rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  opacity: 0;
  transform: translateY(-20px);
  pointer-events: none;
  transition: all 0.3s ease;
  z-index: 999;
}
.mobile-menu a { color: var(--silver); text-decoration: none; font-weight: 700; font-size: 1.2rem; }
.hamburger input:checked ~ .mobile-menu { opacity: 1; pointer-events: auto; transform: translateY(0); }

/* Layout */
.hero { padding: 150px 5% 4rem; text-align: center; }
.hero h1 { font-family: 'Dela Gothic One', sans-serif; font-size: 3.5rem; color: var(--brunswick-green); margin-bottom: 1rem; }

.links-section { background-color: var(--brunswick-green); padding: 4rem 5%; }
.links-container {
  max-width: 800px;
  margin: 0 auto;
  background-color: var(--silver);
  padding: 3rem;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.link-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 0;
  border-bottom: 1px solid rgba(0,0,0,0.1);
}
.link-row:last-child { border-bottom: none; }
.link-row p { font-weight: 700; font-size: 1.1rem; }

button {
  background-color: var(--brunswick-green);
  color: white;
  border: none;
  border-radius: 20px;
  padding: 0.6rem 1.5rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
}
button:hover { background-color: var(--pomp-and-power); transform: scale(1.05); }

.wave { line-height: 0; background-color: var(--silver); }
.wave svg { width: 100%; height: 100px; }

footer { text-align: center; padding: 2rem; background-color: var(--raisin-black); color: var(--silver); }

@media (max-width: 900px) {
  nav { display: none; }
  .hamburger { display: block; }
  .hero h1 { font-size: 2.5rem; }
  .links-container { padding: 1.5rem; }
}
</style>
</head>
<body>

<header>
  <a href="/"><img src="/media/favicon.svg" alt="Logo"></a>
    <a href="/">Home</a>
    <a href="/projects">Projects</a>
    <a href="/status">Status</a>
    <a href="/portfolio">Portfolio</a>
    <a href="/links">Links</a>
  </nav>

  <label class="hamburger">
    <input type="checkbox">
    <svg viewBox="0 0 32 32">
      <path class="line line-top-bottom" d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L17 26C17 28.2 18.8 30 21 30 23.2 30 25 28.2 25 26 25 23.8 23.2 22 21 22L7 22"></path>
      <path class="line" d="M7 16 27 16"></path>
    </svg>
    <div class="mobile-menu">
      <a href="/">Home</a>
      <a href="/projects">Projects</a>
      <a href="/status">Status</a>
      <a href="/portfolio">Portfolio</a>
      <a href="/links">Links</a>
    </div>
  </label>
</header>

<section class="hero">
    <h1 id="links-title"></h1>
    <p id="links-subtext"></p>
</section>

<div class="wave">
  <svg viewBox="0 0 1440 100" preserveAspectRatio="none">
    <path d="M0,64 C360,160 1080,0 1440,64 L1440,100 L0,100 Z" fill="#004643"></path>
  </svg>
</div>

<section class="links-section">
    <div class="links-container">
        <div class="link-row"><p>Status Page (Full)</p><button onclick="window.location.href='https://status.rabslabs.xyz/status/default'">Go</button></div>
        <div class="link-row"><p>Jellyfin (Primary)</p><button onclick="window.location.href='https://tv.rabslabs.xyz'">Go</button></div>
        <div class="link-row"><p>Jellyfin (Legacy)</p><button onclick="window.location.href='https://tv3.rabslabs.xyz'">Go</button></div>
        <div class="link-row"><p>GitHub Profile</p><button onclick="window.location.href='https://github.com/rabbibo'">Go</button></div>
        <div class="link-row"><p>GSF</p><button onclick="window.location.href='https://gsf.rabslabs.xyz'">Go</button></div>
        <div class="link-row"><p>Bean Studios</p><button onclick="window.location.href='https://bean.rabslabs.xyz'">Go</button></div>
    </div>
</section>

<footer>
  © 2026 Rab's Labs Inc. All rights reserved.
</footer>

<script>
const titleText = "The Network";
const subText = "Central directory for all Rab's Labs subdomains and hosted projects.";
let tIdx = 0, sIdx = 0;

function typeTitle() {
  if(tIdx < titleText.length) {
    document.getElementById("links-title").innerHTML += titleText.charAt(tIdx);
    tIdx++; setTimeout(typeTitle, 50);
  } else { typeSubtext(); }
}
function typeSubtext() {
  if(sIdx < subText.length) {
    document.getElementById("links-subtext").innerHTML += subText.charAt(sIdx);
    sIdx++; setTimeout(typeSubtext, 25);
  }
}
window.onload = typeTitle;
</script>

</body>
</html>
